openapi: 3.0.0
info:
  title: Users API
  version: 1.0.0
  description: CRUD operations for managing users

paths:
  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      summary: Get a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

    put:
      summary: Update a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '200':
          description: User updated
        '404':
          description: User not found

    delete:
      summary: Delete a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        FirstName:
          type: string
        LastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        password:
          type: string
    UserInput:
      type: object
      required:
        - FirstName
        - LastName
        - email
        - phoneNumber
        - password
      properties:
        FirstName:
          type: string
          example: Aimable
        LastName:
          type: string
          example: Byumvuhore
        email:
          type: string
          example: aimable@example.com
        phoneNumber:
          type: string
          example: "+250781234567"
        password:
          type: string
          example: secret123
