# Application Name and Port
spring.application.name=SpringBootFileUploadAndDownload
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/javatalent
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=3Nyamiyaga100%

# Hibernate and JPA Configurations
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Multipart File Upload Configurations
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB

# Thymeleaf Configuration (if templates are not used)
spring.thymeleaf.check-template-location=false

# Suppress JTA Warnings
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
