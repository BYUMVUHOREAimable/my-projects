{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Sign Up</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg mt-4">
                Sign Up
            </button>
        </form>
        <div class="mt-4 text-center">
            <p>Already have an account? <a href="{% url 'login' %}" class="text-blue-500 hover:text-blue-600">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock content %}
